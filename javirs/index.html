<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Jarvis HQ"/>
<meta name="theme-color" content="#010810"/>
<title>Jarvis — DinkKingdom HQ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --bg:#010810;--surface:rgba(0,20,50,0.6);--surface2:rgba(0,30,70,0.5);
  --border:rgba(0,150,255,0.2);--accent:#00aaff;--bright:#40d4ff;
  --gold:#f5c842;--green:#00ff88;--text:#a0d0ff;--muted:#2a4a6a;
  --panel-w:240px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,'DM Sans',sans-serif;
  display:flex;flex-direction:column;
  background-image:
    radial-gradient(ellipse at 50% 0%,rgba(0,80,180,0.15) 0%,transparent 60%),
    radial-gradient(ellipse at 20% 50%,rgba(0,40,120,0.1) 0%,transparent 50%);
}

/* Scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,100,255,0.012) 2px,rgba(0,100,255,0.012) 3px);pointer-events:none;z-index:9997;}

/* HEADER */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:48px;flex-shrink:0;
  background:rgba(0,10,30,0.9);
  border-bottom:1px solid var(--border);
  position:relative;z-index:100;
  backdrop-filter:blur(20px);
}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--bright),var(--accent),transparent);animation:hdrScan 3s ease-in-out infinite;}
@keyframes hdrScan{0%,100%{opacity:.4;}50%{opacity:1;}}
.logo{font-family:'Bebas Neue',Georgia,sans-serif;font-size:22px;letter-spacing:.25em;color:var(--bright);text-shadow:0 0 20px rgba(0,170,255,.8),0 0 40px rgba(0,170,255,.4);display:flex;align-items:center;gap:10px;}
.logo-sub{font-size:9px;letter-spacing:.12em;color:rgba(0,200,255,.5);font-family:monospace;}
.hpills{display:flex;align-items:center;gap:6px;}
.pill{font-size:9px;font-family:monospace;color:var(--muted);background:rgba(0,30,70,0.8);border:1px solid var(--border);border-radius:4px;padding:3px 8px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.pill .v{color:var(--bright);}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:ldPulse 2s infinite;}
@keyframes ldPulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.hbtn{background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:10px;padding:4px 10px;cursor:pointer;transition:all .2s;font-family:monospace;}
.hbtn:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px rgba(0,170,255,.3);}

/* API BANNER */
#api-banner{background:rgba(0,10,20,0.95);border-bottom:1px solid rgba(245,200,66,.15);padding:7px 20px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:99;}
#api-banner label{font-size:9px;font-family:monospace;color:var(--gold);white-space:nowrap;letter-spacing:.08em;}
#api-key-input{flex:1;max-width:320px;background:rgba(0,5,15,0.9);border:1px solid rgba(245,200,66,.2);border-radius:4px;padding:5px 10px;color:var(--text);font-family:monospace;font-size:11px;outline:none;}
#api-key-input:focus{border-color:var(--gold);}
#save-key-btn{background:var(--gold);color:#000;border:none;border-radius:4px;padding:5px 14px;font-weight:700;font-size:11px;cursor:pointer;}
#key-ok{font-size:10px;color:var(--green);display:none;font-family:monospace;}
#restore-banner{display:none;align-items:center;gap:6px;padding:5px 20px;background:rgba(0,255,136,.04);border-bottom:1px solid rgba(0,255,136,.1);font-size:10px;font-family:monospace;color:var(--green);flex-shrink:0;}
#restore-banner.show{display:flex;}

/* MAIN LAYOUT — left panel + center stage */
.main{display:flex;flex:1;overflow:hidden;}

/* LEFT PANEL */
.left{
  width:var(--panel-w);flex-shrink:0;
  display:flex;flex-direction:column;
  background:rgba(0,8,24,0.85);
  border-right:1px solid var(--border);
  overflow-y:auto;padding:12px 10px;gap:6px;
  -webkit-overflow-scrolling:touch;
  backdrop-filter:blur(10px);
}
.left::-webkit-scrollbar{width:2px;}
.left::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.s-label{font-size:8px;font-family:monospace;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin:6px 0 3px;padding:0 2px;}
.qbtn{background:rgba(0,40,100,0.3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:11px;cursor:pointer;text-align:left;transition:all .2s;line-height:1.4;width:100%;font-family:inherit;}
.qbtn:hover{border-color:var(--accent);color:var(--bright);background:rgba(0,100,255,.1);box-shadow:0 0 10px rgba(0,150,255,.15);}
.sdiv{height:1px;background:var(--border);margin:4px 0;}

/* MEMORY CARD */
.mem-card{background:rgba(0,60,20,.15);border:1px solid rgba(0,255,136,.12);border-radius:8px;padding:10px;margin-top:2px;}
.mem-title{font-size:8px;font-family:monospace;letter-spacing:.15em;color:var(--green);text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.mem-item{font-size:10px;color:rgba(0,200,100,.7);margin-bottom:3px;font-family:monospace;line-height:1.5;}
.mem-item .mk{color:var(--muted);font-size:9px;}
.mem-item .mv{color:rgba(100,255,160,.9);}
.mem-empty{font-size:9px;color:var(--muted);font-style:italic;font-family:monospace;}

/* BUDGET / DAY */
.stat-card{background:rgba(0,30,80,.3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:4px;}
.stat-label{font-size:8px;font-family:monospace;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:3px;}
.stat-val{font-size:24px;color:var(--gold);font-weight:700;text-shadow:0 0 10px rgba(245,200,66,.4);}
.stat-sub{font-size:9px;color:var(--muted);margin-top:1px;}
.day-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}

/* CENTER STAGE */
.stage{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* GLOBE AREA */
#globe-wrap{
  flex-shrink:0;
  height:320px;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#globe-canvas{position:absolute;inset:0;width:100%;height:100%;}

/* Jarvis name under globe */
.jarvis-name{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-family:'Bebas Neue',Georgia,sans-serif;
  font-size:14px;letter-spacing:.5em;
  color:var(--bright);text-shadow:0 0 16px var(--accent),0 0 32px rgba(0,170,255,.4);
  z-index:5;white-space:nowrap;opacity:.8;
}

/* STATUS under name */
.jarvis-status{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  font-size:9px;font-family:monospace;letter-spacing:.2em;
  color:rgba(0,200,255,.5);z-index:5;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.jsdot{width:4px;height:4px;border-radius:50%;background:var(--green);animation:ldPulse 2s infinite;}
.jsdot.thinking{background:var(--accent);animation:ldPulse .5s infinite;}
.jsdot.speaking{background:var(--bright);animation:ldPulse .3s infinite;}

/* Voice waveform */
.vwave{display:none;align-items:center;gap:2px;height:12px;}
.vwave.active{display:flex;}
.vb{width:2px;border-radius:1px;background:var(--bright);box-shadow:0 0 4px var(--accent);}
.vb:nth-child(1){height:4px;animation:vbounce .5s infinite 0s}
.vb:nth-child(2){height:10px;animation:vbounce .5s infinite .08s}
.vb:nth-child(3){height:12px;animation:vbounce .5s infinite .16s}
.vb:nth-child(4){height:7px;animation:vbounce .5s infinite .04s}
.vb:nth-child(5){height:10px;animation:vbounce .5s infinite .12s}
.vb:nth-child(6){height:5px;animation:vbounce .5s infinite .2s}
@keyframes vbounce{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.8);}}

/* CHAT AREA */
#msgs{
  flex:1;overflow-y:auto;padding:16px 28px 8px;
  display:flex;flex-direction:column;gap:12px;
  -webkit-overflow-scrolling:touch;
}
#msgs::-webkit-scrollbar{width:3px;}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.mrow{display:flex;gap:8px;align-items:flex-start;animation:fadeUp .3s ease;}
.mrow.user{justify-content:flex-end;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.mav{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;}
.mav.agent{background:rgba(0,60,120,.6);border:1px solid var(--border);}
.mav.user{background:rgba(0,100,200,.5);border:1px solid rgba(0,150,255,.3);}
.bub{max-width:72%;padding:9px 14px;font-size:13px;line-height:1.65;border-radius:3px 12px 12px 12px;}
.bub.agent{
  background:rgba(0,20,50,0.7);border:1px solid var(--border);color:var(--text);
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(0,100,255,.08);
}
.bub.user{
  background:rgba(0,80,180,0.4);color:#fff;
  border:1px solid rgba(0,150,255,.3);
  border-radius:12px 3px 12px 12px;font-weight:500;
  backdrop-filter:blur(10px);
}
.bub h1{font-size:14px;color:var(--bright);font-weight:700;margin-bottom:5px;letter-spacing:.05em;}
.bub h2{font-size:12px;color:var(--text);margin:7px 0 3px;border-left:2px solid var(--accent);padding-left:6px;}
.bub h3{font-size:11px;color:var(--muted);margin:5px 0 2px;}
.bub p{margin-bottom:3px;}
.bub strong{color:var(--bright);}
.bub .li{padding-left:3px;color:rgba(150,200,255,.8);margin-bottom:2px;}
.bub code{font-family:monospace;font-size:10px;background:rgba(0,40,100,.5);border-radius:3px;padding:1px 4px;color:var(--bright);}

.t-row{display:flex;gap:8px;align-items:flex-start;}
.t-bub{background:rgba(0,20,50,.7);border:1px solid var(--border);border-radius:3px 12px 12px 12px;padding:10px 14px;display:flex;gap:4px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;animation:tbounce 1s infinite;}
.dot:nth-child(1){background:var(--accent);animation-delay:0s;}
.dot:nth-child(2){background:var(--bright);animation-delay:.15s;}
.dot:nth-child(3){background:var(--accent);animation-delay:.3s;}
@keyframes tbounce{0%,80%,100%{transform:translateY(0);opacity:.3;}40%{transform:translateY(-5px);opacity:1;}}

/* INPUT BAR */
.ibar{
  padding:10px 20px;
  background:rgba(0,8,24,0.9);
  border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:flex-end;
  flex-shrink:0;backdrop-filter:blur(20px);
}
#txt{
  flex:1;background:rgba(0,20,60,0.6);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;
  resize:none;outline:none;line-height:1.5;max-height:100px;
  transition:border-color .2s;font-family:inherit;
  backdrop-filter:blur(10px);
}
#txt:focus{border-color:var(--accent);box-shadow:0 0 12px rgba(0,150,255,.2);}
#txt::placeholder{color:var(--muted);}
#mic{
  width:40px;height:40px;background:rgba(0,30,80,.6);
  border:1px solid var(--border);border-radius:10px;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
#mic:hover{border-color:var(--bright);box-shadow:0 0 10px rgba(0,200,255,.3);}
#mic.recording{background:rgba(200,20,20,.2);border-color:#e74c3c;animation:recPulse .7s infinite;}
#mic.waiting{border-color:var(--gold);animation:recPulse .7s infinite;}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,150,255,.4);}50%{box-shadow:0 0 0 8px rgba(0,150,255,0);}}
#send{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--accent),var(--bright));
  color:#000;border:none;border-radius:10px;font-size:17px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .2s;
}
#send:active{opacity:.7;}
#send:disabled{opacity:.2;cursor:not-allowed;}
#mstat{display:none;align-items:center;gap:7px;padding:5px 20px;background:rgba(200,20,20,.06);border-top:1px solid rgba(200,20,20,.15);font-size:10px;font-family:monospace;color:#e74c3c;flex-shrink:0;}
#mstat.on{display:flex;}
.mwave{display:flex;gap:2px;align-items:center;}
.mb{width:2px;background:#e74c3c;border-radius:1px;animation:mwave 1s infinite;}
.mb:nth-child(1){height:5px}.mb:nth-child(2){height:10px;animation-delay:.1s}.mb:nth-child(3){height:7px;animation-delay:.25s}.mb:nth-child(4){height:12px;animation-delay:.05s}.mb:nth-child(5){height:5px;animation-delay:.2s}
@keyframes mwave{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.7);}}

/* STOP BUTTON */
#voicestop{display:none;position:fixed;bottom:70px;right:24px;z-index:500;background:rgba(0,100,200,.8);border:1px solid var(--bright);border-radius:50%;width:44px;height:44px;font-size:16px;cursor:pointer;color:#fff;box-shadow:0 0 20px rgba(0,150,255,.5);backdrop-filter:blur(10px);}
#voicestop.show{display:flex;align-items:center;justify-content:center;}

@media(max-width:680px){:root{--panel-w:190px;}#globe-wrap{height:240px;}.bub{max-width:85%;font-size:12px;}.pill:not(.keep){display:none;}#msgs{padding:12px 16px 8px;}}
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
</style>
</head>
<body>

<header>
  <div class="logo">⬡ JARVIS <span class="logo-sub">DINKKINGDOM INTELLIGENCE</span></div>
  <div class="hpills">
    <div class="pill keep"><span class="ldot"></span><span class="v">ONLINE</span></div>
    <div class="pill">DAY <span class="v" id="dpill">1</span>/90</div>
    <div class="pill">TARGET <span class="v">$10K</span></div>
    <button class="hbtn" id="voicetoggle">🔊 ON</button>
    <button class="hbtn" id="clr">↺ Reset</button>
    <button class="hbtn" id="exp">⬇ Export</button>
  </div>
</header>

<div id="api-banner">
  <label>⚡ API KEY</label>
  <input id="api-key-input" type="password" placeholder="sk-ant-api03-..." autocomplete="off"/>
  <button id="save-key-btn">Save</button>
  <span id="key-ok">✓ Saved</span>
</div>
<div id="restore-banner">🧠 Memory restored — Jarvis remembers everything</div>

<div class="main">

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="s-label">Quick Ask</div>
    <button class="qbtn" data-msg="What should I do today?">📋 Today's tasks</button>
    <button class="qbtn" data-msg="What's my next step?">➡️ Next step</button>
    <button class="qbtn" data-msg="How should I spend my budget?">💰 Budget advice</button>
    <button class="qbtn" data-msg="How do I get more Etsy sales?">📈 More sales</button>
    <button class="qbtn" data-msg="Give me a new product idea">💡 Product idea</button>
    <button class="qbtn" data-msg="How do I improve my Etsy SEO?">🔍 SEO tips</button>
    <button class="qbtn" data-msg="How do I promote on TikTok?">🎵 TikTok tips</button>
    <button class="qbtn" data-msg="I got a sale! What do I do now?">🎉 Got a sale!</button>

    <div class="sdiv"></div>

    <div class="mem-card">
      <div class="mem-title">🧠 Neural Memory</div>
      <div id="memdisplay"><div class="mem-empty">No memory yet</div></div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Budget Remaining</div>
      <div class="stat-val" id="bamt">$100</div>
      <div class="stat-sub">Tracked by Jarvis</div>
    </div>

    <div class="stat-card">
      <div class="day-row">
        <div><div class="stat-label">DAY</div><div class="stat-val" id="dcount" style="font-size:20px;color:var(--accent2,#ff6b35);">1</div></div>
        <div style="text-align:right"><div class="stat-label">GOAL</div><div class="stat-val" style="font-size:20px;color:var(--muted);">90</div></div>
      </div>
    </div>
  </div>

  <!-- CENTER STAGE -->
  <div class="stage">

    <!-- GLOBE -->
    <div id="globe-wrap">
      <canvas id="globe-canvas"></canvas>

      <div class="jarvis-status" id="jstatus">
        <div class="jsdot" id="jsdot"></div>
        <span id="jslabel">STANDBY</span>
        <div class="vwave" id="vwave">
          <div class="vb"></div><div class="vb"></div><div class="vb"></div>
          <div class="vb"></div><div class="vb"></div><div class="vb"></div>
        </div>
      </div>
      <div class="jarvis-name">J · A · R · V · I · S</div>
    </div>

    <!-- CHAT -->
    <div id="msgs"></div>

    <div id="mstat">
      <div class="mwave"><div class="mb"></div><div class="mb"></div><div class="mb"></div><div class="mb"></div><div class="mb"></div></div>
      Listening — tap mic again to stop
    </div>

    <div class="ibar">
      <textarea id="txt" rows="1" placeholder="Ask Jarvis anything..."></textarea>
      <button id="mic">🎤</button>
      <button id="send">➤</button>
    </div>
  </div>
</div>

<button id="voicestop">⏹</button>

<script>
/* ═══════════════════════════════════════════════
   IRON MAN HOLOGRAPHIC GLOBE — Three.js
═══════════════════════════════════════════════ */
(function(){
  var wrap = document.getElementById('globe-wrap');
  var canvas = document.getElementById('globe-canvas');
  var W = wrap.offsetWidth, H = wrap.offsetHeight;

  var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true, alpha:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 100);
  camera.position.set(0, 0, 4.2);

  /* Drag */
  var drag=false, prev={x:0,y:0}, rotT={x:.15,y:0}, rotC={x:.15,y:0};
  wrap.addEventListener('mousedown',function(e){drag=true;prev={x:e.clientX,y:e.clientY};});
  wrap.addEventListener('touchstart',function(e){drag=true;var t=e.touches[0];prev={x:t.clientX,y:t.clientY};},{passive:true});
  window.addEventListener('mouseup',function(){drag=false;});
  window.addEventListener('touchend',function(){drag=false;});
  window.addEventListener('mousemove',function(e){if(!drag)return;rotT.y+=(e.clientX-prev.x)*.008;rotT.x+=(e.clientY-prev.y)*.006;prev={x:e.clientX,y:e.clientY};});
  wrap.addEventListener('touchmove',function(e){if(!drag)return;var t=e.touches[0];rotT.y+=(t.clientX-prev.x)*.008;rotT.x+=(t.clientY-prev.y)*.006;prev={x:t.clientX,y:t.clientY};e.preventDefault();},{passive:false});

  var globe = new THREE.Group();
  scene.add(globe);

  /* ── CIRCUIT LINES on sphere surface ── */
  /* Generate lat/lng grid lines with gaps — like Iron Man globe */
  function spherePt(lat, lng, r){
    var phi = (90-lat) * Math.PI/180;
    var theta = (lng+180) * Math.PI/180;
    return new THREE.Vector3(
      -r * Math.sin(phi) * Math.cos(theta),
       r * Math.cos(phi),
       r * Math.sin(phi) * Math.sin(theta)
    );
  }

  /* Latitude lines */
  for(var lat=-80; lat<=80; lat+=20){
    var pts=[];
    for(var lng=-180; lng<=180; lng+=3){
      pts.push(spherePt(lat, lng, 1.0));
    }
    var geo = new THREE.BufferGeometry().setFromPoints(pts);
    var opacity = lat===0 ? 0.35 : 0.12;
    globe.add(new THREE.Line(geo, new THREE.LineBasicMaterial({color:0x0088ff, transparent:true, opacity:opacity})));
  }

  /* Longitude lines */
  for(var lng2=-180; lng2<180; lng2+=20){
    var pts2=[];
    for(var lat2=-90; lat2<=90; lat2+=3){
      pts2.push(spherePt(lat2, lng2, 1.0));
    }
    var geo2 = new THREE.BufferGeometry().setFromPoints(pts2);
    globe.add(new THREE.Line(geo2, new THREE.LineBasicMaterial({color:0x0066cc, transparent:true, opacity:0.12})));
  }

  /* ── CIRCUIT NODES (intersection points) ── */
  var nodeGeo = new THREE.SphereGeometry(0.018, 6, 6);
  var nodeMat = new THREE.MeshBasicMaterial({color:0x00ccff, transparent:true, opacity:0.9});
  var nodes=[], nodeData=[];

  for(var lat3=-80; lat3<=80; lat3+=20){
    for(var lng3=-180; lng3<180; lng3+=20){
      if(Math.random()<0.7){
        var pos = spherePt(lat3, lng3, 1.0);
        var mesh = new THREE.Mesh(nodeGeo, nodeMat.clone());
        mesh.position.copy(pos);
        mesh.userData = {pulse: Math.random()*Math.PI*2, speed: 0.5+Math.random()*2};
        globe.add(mesh);
        nodes.push(mesh);
        nodeData.push(pos);
      }
    }
  }

  /* ── SIGNAL PULSES along lat/lng lines ── */
  var pulses = [];
  var pMat = new THREE.MeshBasicMaterial({color:0x44ddff, transparent:true, opacity:1});
  var pGeo = new THREE.SphereGeometry(0.025, 4, 4);

  function firePulse(){
    if(pulses.length > 25) return;
    // Pick a random lat or lng line and animate along it
    var isLat = Math.random() > 0.5;
    var pts3 = [];
    if(isLat){
      var lat4 = (Math.floor(Math.random()*9)-4)*20;
      for(var l=-180; l<=180; l+=4) pts3.push(spherePt(lat4, l, 1.0));
    } else {
      var lng4 = (Math.floor(Math.random()*18)-9)*20;
      for(var l2=-90; l2<=90; l2+=4) pts3.push(spherePt(l2, lng4, 1.0));
    }
    var col = [0x44ddff, 0x0088ff, 0x00ffcc, 0x66aaff][Math.floor(Math.random()*4)];
    var m = new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:1}));
    var startIdx = Math.floor(Math.random()*(pts3.length-10));
    m.userData = {pts:pts3, t:startIdx, speed:0.4+Math.random()*0.6};
    globe.add(m); pulses.push(m);
  }

  /* ── ORBITAL RINGS (Iron Man style) ── */
  var orbits = [];
  var orbitDefs = [
    {r:1.18, tube:0.004, col:0x0088ff, opacity:0.5, rx:Math.PI/2, ry:0, rz:0},
    {r:1.22, tube:0.003, col:0x00aaff, opacity:0.35, rx:0.3, ry:0, rz:Math.PI/6},
    {r:1.28, tube:0.003, col:0x0066cc, opacity:0.25, rx:Math.PI/3, ry:0.5, rz:0},
    {r:1.15, tube:0.005, col:0x44ccff, opacity:0.4, rx:0, ry:0, rz:Math.PI/4},
  ];
  orbitDefs.forEach(function(d){
    var m = new THREE.Mesh(
      new THREE.TorusGeometry(d.r, d.tube, 8, 120),
      new THREE.MeshBasicMaterial({color:d.col, transparent:true, opacity:d.opacity})
    );
    m.rotation.set(d.rx, d.ry, d.rz);
    m.userData = {baseOp: d.opacity, rotSpeedX: (Math.random()-.5)*.003, rotSpeedY: (Math.random()-.5)*.005};
    globe.add(m); orbits.push(m);
  });

  /* ── INNER GLOW CORE ── */
  var coreGeo = new THREE.SphereGeometry(0.15, 16, 16);
  var coreMat = new THREE.MeshBasicMaterial({color:0x00ccff, transparent:true, opacity:0.8});
  var core = new THREE.Mesh(coreGeo, coreMat);
  globe.add(core);

  /* Outer atmosphere shell */
  var atmGeo = new THREE.SphereGeometry(1.08, 32, 32);
  var atmMat = new THREE.MeshBasicMaterial({color:0x0044aa, transparent:true, opacity:0.06, side:THREE.BackSide});
  globe.add(new THREE.Mesh(atmGeo, atmMat));

  /* ── OUTER GLOW (sprite-like plane) ── */
  var glowGeo = new THREE.PlaneGeometry(3.5, 3.5);
  var glowCanvas = document.createElement('canvas');
  glowCanvas.width = glowCanvas.height = 256;
  var gc = glowCanvas.getContext('2d');
  var grad = gc.createRadialGradient(128,128,0,128,128,128);
  grad.addColorStop(0,  'rgba(0,140,255,0.18)');
  grad.addColorStop(0.4,'rgba(0,100,200,0.08)');
  grad.addColorStop(1,  'rgba(0,50,150,0)');
  gc.fillStyle=grad; gc.fillRect(0,0,256,256);
  var glowTex = new THREE.CanvasTexture(glowCanvas);
  var glowMesh = new THREE.Mesh(glowGeo, new THREE.MeshBasicMaterial({map:glowTex, transparent:true, opacity:1, depthWrite:false}));
  glowMesh.position.z = -0.5;
  scene.add(glowMesh);

  /* ── BACKGROUND STARS ── */
  var starV=[];
  for(var i=0;i<500;i++){var r=4+Math.random()*4,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);starV.push(r*Math.sin(ph)*Math.cos(th),r*Math.sin(ph)*Math.sin(th),r*Math.cos(ph));}
  var sGeo=new THREE.BufferGeometry();sGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(starV),3));
  var starField=new THREE.Points(sGeo,new THREE.PointsMaterial({color:0x88aacc,size:0.015,transparent:true,opacity:0.5}));
  scene.add(starField);

  window._brainState = 'idle';
  var clock = new THREE.Clock(), pulseT=0;

  function animate(){
    requestAnimationFrame(animate);
    var t = clock.getElapsedTime();
    var state = window._brainState;
    var thinking = state==='thinking';
    var speaking = state==='speaking';
    var active = thinking||speaking;

    /* Smooth rotation */
    rotC.x += (rotT.x-rotC.x)*.07;
    rotC.y += (rotT.y-rotC.y)*.07;
    globe.rotation.x = rotC.x;
    globe.rotation.y = rotC.y;
    var spin = speaking?.012 : thinking?.007 : .003;
    if(!drag) rotT.y += spin;

    /* Node pulse */
    nodes.forEach(function(n){
      var spd = speaking?6 : thinking?3.5 : 1;
      var p = .5+.5*Math.sin(t*n.userData.speed*spd+n.userData.pulse);
      n.material.opacity = active ? Math.min(.4+p*.9,1) : .3+p*.5;
      n.scale.setScalar(speaking?1+p*.8 : thinking?1+p*.5 : 1+p*.2);
    });

    /* Core pulse */
    var cp = .5+.5*Math.sin(t*(speaking?8:thinking?4:1.5));
    coreMat.opacity = speaking ? 0.6+cp*.4 : thinking ? 0.4+cp*.4 : 0.2+cp*.2;
    core.scale.setScalar(speaking?1+cp*.8 : thinking?1+cp*.4 : 1+cp*.1);

    /* Orbits */
    orbits.forEach(function(o,i){
      var spd2 = speaking?4 : thinking?2.5 : 1;
      o.rotation.x += o.userData.rotSpeedX*spd2;
      o.rotation.y += o.userData.rotSpeedY*spd2;
      o.material.opacity = active ? Math.min(o.userData.baseOp*2.5, 0.9) : o.userData.baseOp*(0.7+0.3*Math.sin(t+i));
    });

    /* Lat/lng grid brightness */
    globe.children.forEach(function(c){
      if(c.isLine && c.material){
        var base = c.material.opacity > 0.2 ? 0.35 : 0.12;
        c.material.opacity = active ? Math.min(base*2.5, 0.8) : base*(0.7+0.3*Math.sin(t*.8));
      }
    });

    /* Glow */
    glowMesh.material.opacity = speaking ? 0.8+cp*.2 : thinking ? 0.6 : 0.4+cp*.2;
    glowMesh.lookAt(camera.position);

    /* Star twinkle */
    starField.material.opacity = .3+.2*Math.sin(t*.4);

    /* Pulses */
    pulseT += speaking?.14 : thinking?.08 : .025;
    if(pulseT>1){pulseT=0;firePulse();if(active)firePulse();}
    for(var i=pulses.length-1;i>=0;i--){
      var pu=pulses[i];
      pu.userData.t+=pu.userData.speed*(speaking?3:thinking?2:1);
      var idx=Math.floor(pu.userData.t);
      if(idx>=pu.userData.pts.length-1){globe.remove(pu);pulses.splice(i,1);continue;}
      var frac=pu.userData.t-idx;
      pu.position.lerpVectors(pu.userData.pts[idx],pu.userData.pts[Math.min(idx+1,pu.userData.pts.length-1)],frac);
      pu.material.opacity=Math.sin((pu.userData.t/pu.userData.pts.length)*Math.PI);
    }

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize',function(){
    W=wrap.offsetWidth;H=wrap.offsetHeight;
    renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();
  });
})();

    if(mem.niche||mem.shop_name||mem.current_phase){
      memCtx='\n\nCONTEXT:\n';
      if(mem.niche)memCtx+='Niche: '+mem.niche+'\n';
      if(mem.shop_name)memCtx+='Shop: '+mem.shop_name+'\n';
      if(mem.budget_remaining)memCtx+='Budget: '+mem.budget_remaining+'\n';
      if(mem.current_phase)memCtx+='Phase: '+mem.current_phase+'\n';
      if(mem.last_completed)memCtx+='Last done: '+mem.last_completed+'\n';
      if(mem.notes&&mem.notes.length)memCtx+='Notes: '+mem.notes.join('; ')+'\n';
    }

    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1800,system:SYSTEM+memCtx,messages:apiHistory})
    })
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.error){hideTyping();setBrainState('idle');addMsg('agent','API Error: '+data.error.message);return;}
      var raw=(data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n').trim();
      var clean=parseMem(raw);
      apiHistory.push({role:'assistant',content:data.content});
      hideTyping();
      addMsg('agent',clean||'Got it.');
      speak(clean);
      saveSession();
    })
    .catch(function(err){hideTyping();setBrainState('idle');addMsg('agent','Connection error. Check your API key.');console.error(err);})
    .finally(function(){isLoading=false;document.getElementById('send').disabled=false;});
  }

  /* ── MEMORY MIGRATION ──
     Scans every key name ever used across all versions
     and migrates data into the permanent canonical keys  */
  function migrateMemory(){
    var legacy={
      h:   ['hq-h','jv-h'],
      d:   ['hq-d','jv-d'],
      mem: ['hq-m','jv-mem','hq-mem'],
      date:['jv-date'],
      key: ['jv-key']
    };
    Object.keys(legacy).forEach(function(canon){
      if(localStorage.getItem(K[canon])) return;
      legacy[canon].forEach(function(old){
        var val=localStorage.getItem(old);
        if(val){ localStorage.setItem(K[canon],val); console.log('Migrated '+old+' -> '+K[canon]); }
      });
    });
  }

  /* INIT */
  setBrainState('idle');
  migrateMemory();
  var restored=loadSession();
  if(!restored)welcome();
  else{addMsg('agent','Systems online. Welcome back.');speak('Systems online. Welcome back.');}

})();
</script>
